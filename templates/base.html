{% load static %}
<!DOCTYPE html>
<html lang="en" class="light-style layout-navbar-fixed layout-menu-fixed" dir="rtl" data-theme="theme-default"
  data-assets-path="{% static '' %}" data-template="vertical-menu-template">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>{{request.user.gamenet}}</title>
  <meta name="description" content="">
  <link rel="icon" type="image/x-icon" href="{% static 'img/favicon/favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'vendor/fonts/materialdesignicons.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/fonts/fontawesome.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/node-waves/node-waves.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/css/rtl/core.css' %}" class="template-customizer-core-css">
  <link rel="stylesheet" href="{% static 'vendor/css/rtl/theme-default.css' %}" class="template-customizer-theme-css">
  <link rel="stylesheet" href="{% static 'css/demo.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/perfect-scrollbar/perfect-scrollbar.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/typeahead-js/typeahead.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/select2/select2.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/tagify/tagify.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/bootstrap-select/bootstrap-select.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/typeahead-js/typeahead.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/sweetalert2/sweetalert2.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/flatpickr/flatpickr.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/datatables-bs5/datatables.bootstrap5.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/libs/datatables-responsive-bs5/responsive.bootstrap5.css' %}">
  <script src="{% static 'vendor/js/helpers.js' %}"></script>
  <script src="{% static 'vendor/js/template-customizer.js' %}"></script>
  <script src="{% static 'js/config.js' %}"></script>
  <style>
    .flatpickr-calendar {
      direction: rtl;
    }

    .flatpickr-time {
      direction: ltr;
    }

    .dataTables_wrapper {
      direction: rtl;
    }

    .dataTables_filter {
      float: right;
      text-align: right;
    }

    .dataTables_length {
      float: left;
    }

    .dataTables_wrapper .row:first-child {
      display: flex;
    }

    .dataTables_wrapper .row:first-child>div:first-child {
      order: 2;
    }

    .dataTables_wrapper .row:first-child>div:last-child {
      order: 1;
    }
  </style>
</head>

<body>
  <div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">
      <aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme shadow">
        <div class="app-brand mt-4 mb-4">
          <a href="index.html" class="app-brand-link"><span class="app-brand-logo mt-4"><span
                style="color: var(--bs-primary)"></span></span><span class="app-brand-text menu-text fw-bold ms-2">{{request.user.gamenet}}</span></a><a
            href="javascript:void(0);" class="layout-menu-toggle menu-link text-large ms-auto"><svg width="22"
              height="22" viewbox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M11.4854 4.88844C11.0081 4.41121 10.2344 4.41121 9.75715 4.88844L4.51028 10.1353C4.03297 10.6126 4.03297 11.3865 4.51028 11.8638L9.75715 17.1107C10.2344 17.5879 11.0081 17.5879 11.4854 17.1107C11.9626 16.6334 11.9626 15.8597 11.4854 15.3824L7.96672 11.8638C7.48942 11.3865 7.48942 10.6126 7.96672 10.1353L11.4854 6.61667C11.9626 6.13943 11.9626 5.36568 11.4854 4.88844Z"
                fill="currentColor" fill-opacity="0.6"></path>
              <path
                d="M15.8683 4.88844L10.6214 10.1353C10.1441 10.6126 10.1441 11.3865 10.6214 11.8638L15.8683 17.1107C16.3455 17.5879 17.1192 17.5879 17.5965 17.1107C18.0737 16.6334 18.0737 15.8597 17.5965 15.3824L14.0778 11.8638C13.6005 11.3865 13.6005 10.6126 14.0778 10.1353L17.5965 6.61667C18.0737 6.13943 18.0737 5.36568 17.5965 4.88844C17.1192 4.41121 16.3455 4.41121 15.8683 4.88844Z"
                fill="currentColor" fill-opacity="0.38"></path>
            </svg></a>
        </div>
        <div class="menu-inner-shadow"></div>
        <ul class="menu-inner py-1">
          <li class="menu-item {% block a%}{% endblock %}"><a href="{% url 'sessions_app:index' %}" class="menu-link"><i class="menu-icon tf-icons mdi mdi-table"></i>
              <div>داشبورد</div>
            </a></li>
            <li class="menu-header fw-light mt-4"><span class="menu-header-text">اطلاعات پایه</span></li>
            <li class="menu-item {% block b%}{% endblock %}"><a href="{% url 'stations:index' %}" class="menu-link"><i class="menu-icon tf-icons mdi mdi-table"></i>
              <div>ایستگاه‌ها</div>
            </a></li>
        </ul>
        <li class="menu-item"><a href="#" target="_blank" class="menu-link"><i
              class="menu-icon tf-icons mdi mdi-logout"></i>
            <div>خروج از حساب</div>
          </a></li>
      </aside>
      <div class="layout-page">

        <nav class="layout-navbar navbar navbar-expand-xl align-items-center bg-navbar-theme" id="layout-navbar">
          <div class="container-xxl">
            <div class="demo d-none d-xl-flex py-0 me-4">
              <span class="nav-item me-2 ms-2 badge bg-label-dark" id="date"></span>
            </div>
            <div class="layout-menu-toggle navbar-nav align-items-xl-center me-3 me-xl-0 d-xl-none"><a
                class="nav-item nav-link px-0 me-xl-4" href="javascript:void(0)"><i
                  class="mdi mdi-menu mdi-24px"></i></a></div>
            <div class="navbar-nav-right d-flex align-items-center" id="navbar-collapse">
              <ul class="navbar-nav flex-row align-items-center ms-auto">
                <li class="nav-item me-1 me-xl-0"><a
                    class="nav-link btn btn-text-secondary rounded-pill btn-icon style-switcher-toggle hide-arrow"
                    href="javascript:void(0);"><i class="mdi mdi-24px"></i></a></li>
              </ul>
            </div>
          </div>
        </nav>

        {% block content %}{% endblock %}

        <footer class="content-footer footer bg-footer-theme">
          <div class="container-xxl">
            <div
              class="footer-container d-flex align-items-center justify-content-center py-3 flex-md-row flex-column">
              <div class="mb-2 mb-md-0">ساخته شده با<span class="text-danger"> ❤️</span> توسط <a href="#"
                  target="_blank" class="footer-link fw-medium">مصطفی سپهری</a>
              </div>
            </div>
          </div>
        </footer>
        <div class="content-backdrop fade"></div>
      </div>
    </div>
  </div>
  <div class="layout-overlay layout-menu-toggle"></div>
  <div class="drag-target"></div>
  </div>
  <script src="{% static 'vendor/libs/flatpickr/flatpickr.js' %}"></script>
  <script src="{% static 'vendor/libs/jquery/jquery.js' %}"></script>
  <script src="{% static 'vendor/libs/popper/popper.js' %}"></script>
  <script src="{% static 'vendor/js/bootstrap.js' %}"></script>
  <script src="{% static 'vendor/libs/perfect-scrollbar/perfect-scrollbar.js' %}"></script>
  <script src="{% static 'vendor/libs/node-waves/node-waves.js' %}"></script>
  <script src="{% static 'vendor/libs/hammer/hammer.js' %}"></script>
  <script src="{% static 'vendor/libs/i18n/i18n.js' %}"></script>
  <script src="{% static 'vendor/libs/typeahead-js/typeahead.js' %}"></script>
  <script src="{% static 'vendor/js/menu.js' %}"></script>
  <script src="{% static 'vendor/libs/select2/select2.js' %}"></script>
  <script src="{% static 'vendor/libs/tagify/tagify.js' %}"></script>
  <script src="{% static 'vendor/libs/bootstrap-select/bootstrap-select.js' %}"></script>
  <script src="{% static 'vendor/libs/typeahead-js/typeahead.js' %}"></script>
  <script src="{% static 'vendor/libs/bloodhound/bloodhound.js' %}"></script>
  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'js/forms-selects.js' %}"></script>
  <script src="{% static 'js/forms-tagify.js' %}"></script>
  <script src="{% static 'js/forms-typeahead.js' %}"></script>
  <script src="{% static 'vendor/libs/nouislider/nouislider.js' %}"></script>
  <script src="{% static 'vendor/libs/sweetalert2/sweetalert2.js' %}"></script>
  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'js/extended-ui-sweetalert2.js' %}"></script>
  <script src="{% static 'vendor/libs/datatables-bs5/datatables-bootstrap5.js' %}"></script>
  <script src="{% static 'js/tables-datatables-advanced.js' %}"></script>
  <script src="{% static 'js/time-show.js' %}"></script>
  <script src="{% static 'js/number-split.js' %}"></script>
  <script src="{% static 'js/boofe.js' %}"></script>
  <script src="{% static 'vendor/libs/jquery-repeater/jquery-repeater.js' %}">

  <script>
    const select = document.getElementById("limitType");
    const timeField = document.getElementById("timeField");
    const amountField = document.getElementById("amountField");

    select.addEventListener("change", function () {

      timeField.classList.add("d-none");
      amountField.classList.add("d-none");

      if (this.value === "time") {
        timeField.classList.remove("d-none");
      }

      if (this.value === "amount") {
        amountField.classList.remove("d-none");
      }

    });

  </script>
  <script>
    flatpickr("#timePicker", {
      enableTime: true,
      noCalendar: true,
      dateFormat: "H:i",
      time_24hr: true,
      allowInput: true,
    });
  </script>
</body>

</html>
